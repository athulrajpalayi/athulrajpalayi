<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="90%">
      <stop offset="0%" stop-color="#0e2430"/>
      <stop offset="55%" stop-color="#0a1a26"/>
      <stop offset="100%" stop-color="#06111b"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .dot { animation: pulse 4s ease-in-out infinite; }
      .d2 { animation-delay: 1s; } .d3 { animation-delay: 2s; } .d4 { animation-delay: 3s; }
      .d5 { animation-delay: .5s; } .d6 { animation-delay: 1.6s; } .d7 { animation-delay: 2.4s; }
      @keyframes pulse { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
      .lines { animation: shimmer 7s ease-in-out infinite; }
      @keyframes shimmer { 0%,100% { opacity: .18; } 50% { opacity: .42; } }
      .name { font: 800 58px 'Segoe UI', system-ui, -apple-system, sans-serif; letter-spacing: 1px; }
      .tag  { font: 600 15px 'Consolas', 'Courier New', monospace; letter-spacing: 4px; }
      .sys  { font: 500 12px 'Consolas', 'Courier New', monospace; letter-spacing: 2px; }
      .chip { font: 600 11px 'Consolas', 'Courier New', monospace; letter-spacing: 2px; }
      .caret { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    </style>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- constellation lines -->
  <g class="lines" stroke="#2dd4bf" stroke-width="0.7" fill="none">
    <path d="M60 70 L150 120 L110 210"/>
    <path d="M150 120 L260 90 L340 160"/>
    <path d="M950 60 L1040 110 L1130 70"/>
    <path d="M1040 110 L1000 200 L1090 240"/>
    <path d="M820 230 L900 190 L1000 200"/>
    <path d="M260 90 L230 40"/>
    <path d="M340 160 L300 235"/>
    <path d="M900 190 L950 60"/>
  </g>

  <!-- particles -->
  <g filter="url(#softglow)">
    <circle class="dot"     cx="60"   cy="70"  r="3"   fill="#22d3ee"/>
    <circle class="dot d2"  cx="150"  cy="120" r="2.4" fill="#34d399"/>
    <circle class="dot d3"  cx="110"  cy="210" r="2"   fill="#a78bfa"/>
    <circle class="dot d4"  cx="260"  cy="90"  r="2.6" fill="#22d3ee"/>
    <circle class="dot d5"  cx="340"  cy="160" r="2"   fill="#34d399"/>
    <circle class="dot d6"  cx="230"  cy="40"  r="1.7" fill="#a78bfa"/>
    <circle class="dot d7"  cx="300"  cy="235" r="2.2" fill="#22d3ee"/>
    <circle class="dot d3"  cx="950"  cy="60"  r="2.6" fill="#22d3ee"/>
    <circle class="dot d5"  cx="1040" cy="110" r="2.2" fill="#a78bfa"/>
    <circle class="dot"     cx="1130" cy="70"  r="2"   fill="#34d399"/>
    <circle class="dot d2"  cx="1000" cy="200" r="2.6" fill="#22d3ee"/>
    <circle class="dot d6"  cx="1090" cy="240" r="1.8" fill="#a78bfa"/>
    <circle class="dot d4"  cx="900"  cy="190" r="2.2" fill="#34d399"/>
    <circle class="dot d7"  cx="820"  cy="230" r="1.8" fill="#22d3ee"/>
    <circle class="dot d5"  cx="480"  cy="40"  r="1.6" fill="#34d399"/>
    <circle class="dot d3"  cx="700"  cy="30"  r="1.8" fill="#22d3ee"/>
    <circle class="dot d6"  cx="560"  cy="262" r="1.7" fill="#a78bfa"/>
    <circle class="dot d2"  cx="740"  cy="255" r="1.9" fill="#34d399"/>
    <circle class="dot d4"  cx="420"  cy="250" r="1.5" fill="#22d3ee"/>
  </g>

  <!-- terminal status line -->
  <text class="sys" x="600" y="78" text-anchor="middle" fill="#4bd8c2">&gt;_ [SYSTEM] &gt; profile.v2 ✓ READY</text>

  <!-- neon name -->
  <text class="name" x="600" y="152" text-anchor="middle" fill="#d7fbff" filter="url(#glow)">Athulraj Palayi</text>
  <text class="name" x="600" y="152" text-anchor="middle" fill="#eafeff" opacity="0.9">Athulraj Palayi</text>

  <!-- tagline -->
  <text class="tag" x="600" y="192" text-anchor="middle" fill="#39c7b2">CYBER&#160;&#160;|&#160;&#160;AI&#160;&#160;|&#160;&#160;BUILDER<tspan class="caret" fill="#22d3ee">▌</tspan></text>

  <!-- chips -->
  <g>
    <rect x="415" y="218" rx="14" ry="14" width="112" height="28" fill="none" stroke="#1f6f63" stroke-width="1"/>
    <text class="chip" x="471" y="236" text-anchor="middle" fill="#4bd8c2">[CEH V10]</text>
    <rect x="537" y="218" rx="14" ry="14" width="160" height="28" fill="none" stroke="#1f6f63" stroke-width="1"/>
    <text class="chip" x="617" y="236" text-anchor="middle" fill="#4bd8c2">[ETHICAL HACKER]</text>
    <rect x="707" y="218" rx="14" ry="14" width="130" height="28" fill="none" stroke="#1f6f63" stroke-width="1"/>
    <text class="chip" x="772" y="236" text-anchor="middle" fill="#4bd8c2">[DUBAI, UAE]</text>
  </g>
</svg>
